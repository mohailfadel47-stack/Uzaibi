<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام حجوزات الطاقم</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f4f4f9; }
        .header { margin-bottom: 20px; }
        .header h1 { margin: 0; color: #333; }
        .header p { margin: 5px 0; color: #007bff; font-weight: bold; font-size: 1.2em; }
        .header .engineer-name { color: #555; font-size: 0.9em; margin-bottom: 5px; }
        .admin-section { margin-bottom: 30px; padding: 10px; background: #eee; border-radius: 10px; }
        .section-title { font-size: 20px; margin: 20px 0; color: #333; border-bottom: 2px solid #007bff; display: inline-block; }
        .slot { border: 2px solid #ddd; padding: 15px; margin: 10px auto; border-radius: 12px; background: white; width: 80%; max-width: 400px; }
        .taken { border-color: #ff4d4d; background: #ffe6e6; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; margin: 5px; }
        .btn-reset { background: #dc3545; color: white; }
        .btn-add { background: #007bff; color: white; }
        .btn-del { background: #6c757d; color: white; font-size: 12px; }
        .btn-wa { background: #25d366; color: white; cursor: pointer; border: none; display: inline-block; padding: 10px 20px; border-radius: 5px; font-weight: bold; text-decoration: none; }
        .local-time { font-size: 0.85em; color: #555; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div class="engineer-name">م/ محمد العزيبي</div>
        <h1>جدول الرومات</h1>
        <p>Above Power</p>
    </div>
    
    <div class="admin-section">
        <button class="btn-reset" onclick="resetBookings()">تجديد الحجز للسيزون الجديد</button>
        <button class="btn-add" onclick="addNewSlot()">إضافة روم جديد</button>
    </div>

    <div id="schedule"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBr2yXP2HY5HQnUtgyem_j5wzVXuP3v3X0",
            authDomain: "rooms-5f446.firebaseapp.com",
            databaseURL: "https://rooms-5f446-default-rtdb.firebaseio.com",
            projectId: "rooms-5f446",
            storageBucket: "rooms-5f446.appspot.com",
            messagingSenderId: "750440035757",
            appId: "1:750440035757:web:bbf318ad577cc7e68add24"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function resetBookings() {
            const pass = prompt("أدخل كلمة مرور المسؤول:");
            if(pass === "1234") {
                db.ref('slots').remove();
                db.ref('custom_slots').remove();
                alert("تم تصفير الجدول والرومات الإضافية بنجاح!");
            } else { alert("كلمة المرور خاطئة!"); }
        }

        function deleteSlot(path) {
            const pass = prompt("أدخل كلمة سر المنسقين للحذف:");
            if (pass === "1234") { db.ref(path).remove(); } 
            else { alert("كلمة المرور خاطئة!"); }
        }

        function cancelBooking(path) {
            const pass = prompt("أدخل كلمة سر المنسقين لإلغاء الحجز:");
            if (pass === "1234") { db.ref(path).remove(); alert("تم إلغاء الحجز بنجاح!"); } 
            else { alert("كلمة المرور خاطئة!"); }
        }

        function requestContact(phone, user) {
            const pass = prompt("أدخل كلمة سر المنسقين للتواصل:");
            if (pass === "1234") { window.location.href = "https://api.whatsapp.com/send?phone=" + phone.replace(/[^0-9]/g, ''); } 
            else { alert("كلمة المرور خاطئة!"); }
        }

        function addNewSlot() {
            const pass = prompt("أدخل كلمة سر المنسقين:");
            if (pass === "1234") {
                const name = prompt("اسم الروم:");
                const start = prompt("وقت البداية (مثال 23:00):");
                const end = prompt("وقت النهاية (مثال 23:25):");
                const display = prompt("نص العرض (مثال: 11:00 - 11:25 م):");
                const type = prompt("حدد الفترة (morning أو evening):").toLowerCase();
                if (name && start && end && display && (type === 'morning' || type === 'evening')) {
                    db.ref('custom_slots').push({ name, start, end, display, type });
                } else { alert("خطأ في البيانات."); }
            } else { alert("كلمة المرور خاطئة!"); }
        }

        function convertToLocal12(saudiTime) {
            const [hours, minutes] = saudiTime.split(':').map(Number);
            const date = new Date();
            date.setUTCHours(hours - 3, minutes, 0, 0);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        function reserve(path) {
            const name = prompt("أدخل اسمك للحجز:");
            if(name) {
                const phone = prompt("أدخل رقم الواتساب (مثال: 96777xxxxxxx):");
                if(phone) {
                    db.ref(path).update({ user: name, phone: phone }, (error) => {
                        if (error) alert("حدث خطأ، حاول مرة أخرى.");
                    });
                }
            }
        }

        const staticSlots = [
            { id: 1, name: "الروم الأول", start: "08:00", end: "08:25", display: "8:00 - 8:25 ص" },
            { id: 2, name: "الروم الثاني", start: "08:25", end: "08:50", display: "8:25 - 8:50 ص" },
            { id: 3, name: "الروم الثالث", start: "08:50", end: "09:15", display: "8:50 - 9:15 ص" },
            { id: 4, name: "الروم الرابع", start: "09:15", end: "09:40", display: "9:15 - 9:40 ص" },
            { id: 5, name: "الروم الخامس", start: "09:40", end: "10:05", display: "9:40 - 10:05 ص" },
            { id: 6, name: "الروم السادس", start: "10:05", end: "10:30", display: "10:05 - 10:30 ص" },
            { id: 7, name: "الروم السابع", start: "10:30", end: "10:55", display: "10:30 - 10:55 ص" },
            { id: 8, name: "الروم الثامن", start: "10:55", end: "11:20", display: "10:55 - 11:20 ص" },
            { id: 9, name: "الروم التاسع", start: "11:20", end: "11:45", display: "11:20 - 11:45 ص" },
            { id: 10, name: "الروم العاشر", start: "11:45", end: "12:00", display: "11:45 - 12:00 م" },
            { id: 11, name: "الروم الأول", start: "18:00", end: "18:25", display: "6:00 - 6:25 م" },
            { id: 12, name: "الروم الثاني", start: "18:25", end: "18:50", display: "6:25 - 6:50 م" },
            { id: 13, name: "الروم الثالث", start: "18:50", end: "19:15", display: "6:50 - 7:15 م" },
            { id: 14, name: "الروم الرابع", start: "19:15", end: "19:40", display: "7:15 - 7:40 م" },
            { id: 15, name: "الروم الخامس", start: "19:40", end: "20:05", display: "7:40 - 8:05 م" },
            { id: 16, name: "الروم السادس", start: "20:05", end: "20:30", display: "8:05 - 8:30 م" },
            { id: 17, name: "الروم السابع", start: "20:30", end: "20:55", display: "8:30 - 8:55 م" },
            { id: 18, name: "الروم الثامن", start: "20:55", end: "21:20", display: "8:55 - 9:20 م" },
            { id: 19, name: "الروم التاسع", start: "21:20", end: "21:45", display: "9:20 - 9:45 م" },
            { id: 20, name: "الروم العاشر", start: "21:45", end: "22:10", display: "9:45 - 10:10 م" },
            { id: 21, name: "الروم الحادي عشر", start: "22:10", end: "22:35", display: "10:10 - 10:35 م" },
            { id: 22, name: "الروم الثاني عشر", start: "22:35", end: "23:00", display: "10:35 - 11:00 م" }
        ];

        function renderSchedule() {
            Promise.all([db.ref('slots').once('value'), db.ref('custom_slots').once('value')])
            .then(([slotsSnap, customSnap]) => {
                const data = slotsSnap.val() || {};
                const customData = customSnap.val() || {};
                const container = document.getElementById('schedule');
                container.innerHTML = "";
                
                function renderSection(type, title) {
                    container.innerHTML += `<div class="section-title">${title}</div>`;
                    staticSlots.forEach(s => {
                        const isMorning = (s.id >= 1 && s.id <= 10);
                        const isEvening = (s.id >= 11 && s.id <= 22);
                        if ((type === 'morning' && isMorning) || (type === 'evening' && isEvening)) {
                            const slotData = data[s.id] || null;
                            container.appendChild(createSlotEl(s.name, s.display, s.start, s.end, slotData, 'slots/' + s.id));
                        }
                    });
                    Object.keys(customData).forEach(key => {
                        if (customData[key].type === type) {
                            const s = customData[key];
                            container.appendChild(createSlotEl(s.name, s.display, s.start, s.end, customData[key].user ? customData[key] : null, 'custom_slots/' + key));
                        }
                    });
                }
                renderSection('morning', 'الفترات الصباحية');
                renderSection('evening', 'الفترات المسائية');
            });
        }

        function createSlotEl(name, display, start, end, isTaken, path) {
            const div = document.createElement('div');
            div.className = `slot ${isTaken ? 'taken' : ''}`;
            const delBtn = path.includes('custom_slots') ? `<br><button class="btn-del" onclick="deleteSlot('${path}')">حذف الروم</button>` : '';
            const cancelBtn = isTaken ? `<br><button class="btn-reset" style="font-size:12px;" onclick="cancelBooking('${path}')">إلغاء حجز ${isTaken.user}</button>` : '';
            const contactBtn = isTaken ? `<br><button class="btn-wa" onclick="requestContact('${isTaken.phone}', '${isTaken.user}')">تواصل مع ${isTaken.user}</button>` : '';
            
            div.innerHTML = `<h3>${name}</h3><p>الموعد: ${display}</p><p class="local-time">(بتوقيتك المحلي: ${convertToLocal12(start)} - ${convertToLocal12(end)})</p>` + 
                            (isTaken ? `<p>المحجوز من قبل: <strong>${isTaken.user}</strong></p>${contactBtn}${cancelBtn}` : `<button onclick="reserve('${path}')">حجز الموعد</button>`) + delBtn;
            return div;
        }

        db.ref('slots').on('value', renderSchedule);
        db.ref('custom_slots').on('value', renderSchedule);
    </script>
</body>
</html>
